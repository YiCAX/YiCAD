name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        # download_thirdparty() 自动下载 ThirdParty.zip（含 Qt 等所有依赖）
        run: |
          cmake --preset Release `
            -G "Visual Studio 17 2022" `
            -A x64

      - name: Build
        run: cmake --build --preset Release --config Release

      - name: Package
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Compress-Archive -Path build/Release/bin/Release* -DestinationPath "YiCAD-${version}-win64.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: YiCAD-*-win64.zip
          generate_release_notes: true
